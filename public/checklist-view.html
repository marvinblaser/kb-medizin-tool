<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist — KB Med</title>
  <link rel="shortcut icon" href="/src/images/swiss_flag.webp" type="image/x-icon">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/layout-shared.css">
  <link rel="stylesheet" href="/css/toast.css">
  <link rel="stylesheet" href="/css/responsive-fix.css">
  <link rel="stylesheet" href="/css/global-fixes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .checklist-view-container { padding: 20px 28px; }

    /* HEADER CARD */
    .checklist-header-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-primary);
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .header-main-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 16px;
    }

    .header-info { flex: 1; }

    .header-breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: var(--text-sm);
    }

    .header-breadcrumbs a {
      color: var(--color-primary);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity var(--transition-fast);
    }

    .header-breadcrumbs a:hover { opacity: 0.8; }
    .separator { color: var(--text-tertiary); }

    .category-pill {
      background: rgba(44,90,160,0.1);
      color: var(--color-primary);
      padding: 2px 10px;
      border-radius: 2px;
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      text-transform: uppercase;
    }

    .header-info h1 {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--text-primary);
      margin: 0 0 6px;
    }

    .header-info p { font-size: var(--text-sm); color: var(--text-secondary); margin: 0; }

    /* PROGRESS CIRCLE */
    .progress-circle-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .progress-text { text-align: center; }
    .progress-text .label { display: block; font-size: 10px; font-weight: var(--font-semibold); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
    .progress-text .value { font-size: var(--text-xl); font-weight: var(--font-bold); color: var(--color-primary); }

    .progress-ring circle { transform-origin: center; transform: rotate(-90deg); transition: stroke-dashoffset 0.5s ease; }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border-primary);
    }

    .spacer { flex: 1; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-primary);
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 3px;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition-fast);
    }

    .btn-ghost:hover { background: var(--bg-secondary); color: var(--text-primary); }

    /* COLUMNS GRID */
    .checklist-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .checklist-column {
      background: var(--bg-elevated);
      border: 1px solid var(--border-primary);
      overflow: hidden;
    }

    .column-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-primary);
      background: var(--bg-secondary);
    }

    .column-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .column-title-row h3 {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .count-badge {
      font-size: 11px;
      font-weight: var(--font-semibold);
      color: var(--text-tertiary);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      padding: 1px 8px;
      border-radius: 2px;
    }

    .progress-bar-track {
      height: 3px;
      background: var(--border-primary);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
      width: 0%;
    }

    .column-content {
      padding: 12px;
      max-height: calc(100vh - 380px);
      overflow-y: auto;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .checklist-view-container { padding: 12px; }
      .header-main-row { flex-direction: column; }
      .checklist-grid { grid-template-columns: 1fr; }
      .column-content { max-height: 300px; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/src/images/logo-kbmed-short.svg" alt="KB Med">
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html"><i class="fas fa-chart-line"></i><span>Tableau de bord</span></a>
      <a href="/clients.html"><i class="fas fa-users"></i><span>Clients</span></a>
      <a href="/checklists.html" class="active"><i class="fas fa-clipboard-check"></i><span>Checklists</span></a>
      <a href="/reports.html"><i class="fas fa-file-alt"></i><span>Rapports</span></a>
      <a href="/stk.html"><i class="fas fa-file-signature"></i><span>STK</span></a>
      <a href="/tickets.html"><i class="fas fa-ticket-alt"></i><span>Tickets</span></a>
      <a href="/admin.html"><i class="fas fa-book"></i><span>Catalogue & Matériel</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="user-info">
        <div class="user-avatar" id="u-avatar">?</div>
        <div>
          <div class="user-name" id="u-name">...</div>
          <div class="user-role" id="u-role">...</div>
        </div>
      </div>
      <div class="sidebar-btn-row">
        <button class="sidebar-btn" onclick="openPreferencesModal()">
          <i class="fas fa-cog"></i> Mes préférences
        </button>
        <button class="sidebar-btn danger" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Quitter</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <div class="header-title-group">
        <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1><i class="fas fa-clipboard-check"></i> Checklist</h1>
      </div>
    </div>

    <div class="checklist-view-container">
      <!-- HEADER CARD -->
      <div class="checklist-header-card">
        <div class="header-main-row">
          <div class="header-info">
            <div class="header-breadcrumbs">
              <a href="/checklists.html"><i class="fas fa-arrow-left"></i> Retour</a>
              <span class="separator">/</span>
              <span id="checklist-category-badge" class="category-pill">Catégorie</span>
            </div>
            <h1 id="checklist-title-text">Chargement...</h1>
            <p id="checklist-description">...</p>
          </div>
          <div class="progress-circle-container">
            <div class="progress-text">
              <span class="label">Progression</span>
              <span class="value" id="global-progress">0%</span>
            </div>
            <svg class="progress-ring" width="60" height="60">
              <circle class="progress-ring__circle-bg" stroke="var(--border-primary)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
              <circle class="progress-ring__circle" id="progress-ring-circle" stroke="var(--color-primary)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
            </svg>
          </div>
        </div>
        <div class="header-actions">
          <div class="spacer"></div>
          <button class="btn-ghost" id="reset-trigger-btn"><i class="fas fa-undo"></i> Réinitialiser</button>
        </div>
      </div>

      <!-- TWO COLUMNS -->
      <div class="checklist-grid">
        <div class="checklist-column">
          <div class="column-header">
            <div class="column-title-row">
              <h3><i class="fas fa-toolbox" style="color:#3b82f6"></i> Matériel</h3>
              <span class="count-badge" id="eq-count">0/0</span>
            </div>
            <div class="progress-bar-track">
              <div id="eq-progress-fill" class="progress-bar-fill" style="background-color:#3b82f6"></div>
            </div>
          </div>
          <div class="column-content" id="equipment-list"></div>
        </div>

        <div class="checklist-column">
          <div class="column-header">
            <div class="column-title-row">
              <h3><i class="fas fa-tasks" style="color:#8b5cf6"></i> Tâches</h3>
              <span class="count-badge" id="task-count">0/0</span>
            </div>
            <div class="progress-bar-track">
              <div id="task-progress-fill" class="progress-bar-fill" style="background-color:#8b5cf6"></div>
            </div>
          </div>
          <div class="column-content" id="tasks-list"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- RESET MODAL -->
<div class="modal" id="reset-confirm-modal">
  <div class="modal-content" style="max-width:400px;text-align:center">
    <div class="modal-body" style="display:block;padding:28px 24px">
      <div style="width:48px;height:48px;background:var(--color-danger-bg);color:var(--color-danger);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 16px">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h2 style="font-size:var(--text-xl);font-weight:var(--font-bold);margin-bottom:8px;color:var(--text-primary)">Réinitialiser ?</h2>
      <p style="color:var(--text-secondary);font-size:var(--text-sm);margin-bottom:0">Vous allez décocher toutes les cases.<br>Cette action est irréversible.</p>
    </div>
    <div class="modal-footer" style="justify-content:center">
      <button class="btn btn-secondary" onclick="closeResetModal()">Annuler</button>
      <button class="btn btn-danger" id="confirm-reset-btn">Confirmer</button>
    </div>
  </div>
</div>

<div id="notification-container"></div>

<script src="/js/confirm.js"></script>
<script type="module" src="/js/init-selects.js"></script>
<script src="/js/loader.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/checklist-view.js"></script>
<script src="/js/mobile-menu.js"></script>
<script src="/js/theme-switcher.js"></script>
<script src="/js/sidebar-init.js"></script>
<script>

function openSettings() { window.location.href = '/admin.html'; }

fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (!d.user) return;
  document.getElementById('u-avatar').textContent = d.user.name[0].toUpperCase();
  document.getElementById('u-name').textContent = d.user.name;
  document.getElementById('u-role').textContent = d.user.role;
}).catch(() => {});
</script>
</body>
</html>
