<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklists — KB Med</title>
  <link rel="shortcut icon" href="/src/images/swiss_flag.webp" type="image/x-icon">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/layout-shared.css">
  <link rel="stylesheet" href="/css/toast.css">
  <link rel="stylesheet" href="/css/responsive-fix.css">
  <link rel="stylesheet" href="/css/global-fixes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/slim-select@2.8.2/dist/slimselect.css" rel="stylesheet">
  <style>
    .checklist-container-fluid { padding: 20px 28px; }

    /* TOOLBAR */
    .toolbar-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-primary);
      padding: 0 16px;
      display: flex;
      align-items: center;
      height: 52px;
      margin-bottom: 20px;
      gap: 0;
    }

    .toolbar-search {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-tertiary);
      flex: 0 0 260px;
    }

    .toolbar-search input {
      border: none;
      background: transparent;
      width: 100%;
      font-size: var(--text-sm);
      color: var(--text-primary);
      outline: none;
    }

    .toolbar-search input::placeholder { color: var(--text-tertiary); }

    .toolbar-divider {
      width: 1px; height: 28px;
      background: var(--border-primary);
      margin: 0 12px;
      flex-shrink: 0;
    }

    .toolbar-tabs { display: flex; height: 100%; }

    .nav-tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      padding: 0 12px;
      white-space: nowrap;
    }

    .nav-tab:hover { color: var(--color-primary); }
    .nav-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: var(--font-semibold); }

    .nav-count {
      background: var(--bg-tertiary);
      color: var(--text-tertiary);
      padding: 1px 6px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: var(--font-semibold);
    }

    .nav-tab.active .nav-count {
      background: rgba(44,90,160,0.1);
      color: var(--color-primary);
    }

    /* GRID */
    .checklists-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    /* PAGINATION */
    .pagination-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }

    .pagination-info { font-size: var(--text-xs); color: var(--text-tertiary); }
    .pagination-buttons { display: flex; gap: 6px; }

    /* MODAL */
    .checklist-items-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 80px;
    }

    .checklist-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-primary);
      padding-bottom: 8px;
    }

    .checklist-section-header h3 {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-save { background: var(--color-primary); color: #fff; border: none; padding: 7px 14px; border-radius: 3px; font-size: var(--text-sm); font-weight: var(--font-medium); cursor: pointer; transition: all var(--transition-fast); }
    .btn-save:hover { background: var(--kb-blue-dark); }

    @media (max-width: 768px) {
      .checklist-container-fluid { padding: 12px; }
      .toolbar-card { height: auto; flex-wrap: wrap; padding: 10px 12px; gap: 8px; }
      .toolbar-search { flex: 1 1 100%; }
      .toolbar-divider { display: none; }
      .toolbar-tabs { flex-wrap: wrap; height: auto; }
      .checklists-grid { grid-template-columns: 1fr; }
      #checklist-modal .modal-content > .modal-body > form > div[style*="grid"] { display: flex; flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/src/images/logo-kbmed-short.svg" alt="KB Med">
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html"><i class="fas fa-chart-line"></i><span>Tableau de bord</span></a>
      <a href="/clients.html"><i class="fas fa-users"></i><span>Clients</span></a>
      <a href="/checklists.html" class="active"><i class="fas fa-clipboard-check"></i><span>Checklists</span></a>
      <a href="/reports.html"><i class="fas fa-file-alt"></i><span>Rapports</span></a>
      <a href="/stk.html"><i class="fas fa-file-signature"></i><span>STK</span></a>
      <a href="/tickets.html"><i class="fas fa-ticket-alt"></i><span>Tickets</span></a>
      <a href="/admin.html"><i class="fas fa-book"></i><span>Catalogue & Matériel</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="user-info">
        <div class="user-avatar" id="u-avatar">?</div>
        <div>
          <div class="user-name" id="u-name">...</div>
          <div class="user-role" id="u-role">...</div>
        </div>
      </div>
      <div class="sidebar-btn-row">
        <button class="sidebar-btn" onclick="openPreferencesModal()">
          <i class="fas fa-cog"></i> Mes préférences
        </button>
        <button class="sidebar-btn danger" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Quitter</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <div class="header-title-group">
        <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1><i class="fas fa-clipboard-list"></i> Gestion des Checklists</h1>
      </div>
      <div class="header-actions-group">
        <button class="btn btn-primary" id="add-checklist-btn"><i class="fas fa-plus"></i> <span class="btn-label">Nouvelle Checklist</span></button>
      </div>
    </div>

    <div class="checklist-container-fluid">
      <!-- TOOLBAR -->
      <div class="toolbar-card">
        <div class="toolbar-search">
          <i class="fas fa-search"></i>
          <input type="text" id="checklist-search" placeholder="Rechercher une checklist...">
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-tabs">
          <button class="nav-tab active" onclick="switchTab('all')">Tous <span class="nav-count" id="count-all">0</span></button>
          <button class="nav-tab" onclick="switchTab('Maintenance')">Maintenance <span class="nav-count" id="count-Maintenance">0</span></button>
          <button class="nav-tab" onclick="switchTab('Installation')">Installation <span class="nav-count" id="count-Installation">0</span></button>
          <button class="nav-tab" onclick="switchTab('Dépannage')">Dépannage <span class="nav-count" id="count-Dépannage">0</span></button>
          <button class="nav-tab" onclick="switchTab('Audit')">Audit <span class="nav-count" id="count-Audit">0</span></button>
          <button class="nav-tab" onclick="switchTab('Autre')">Autre <span class="nav-count" id="count-Autre">0</span></button>
        </div>
        <select id="checklist-sort" onchange="filterChecklists()"
          style="border:none;background:transparent;font-size:var(--text-xs);
          color:var(--text-secondary);cursor:pointer;outline:none;padding:0 4px;font-family:inherit;">
          <option value="date-desc">Plus récent</option>
          <option value="date-asc">Plus ancien</option>
          <option value="name-asc">A→Z</option>
          <option value="name-desc">Z→A</option>
          <option value="tasks-desc">+ de tâches</option>
          <option value="eq-desc">+ de matériel</option>
        </select>
      </div>

      <!-- GRID -->
      <div class="checklists-grid" id="checklists-grid"></div>

      <!-- PAGINATION -->
      <div class="pagination-bar" id="pagination-container" style="display:none">
        <span class="pagination-info" id="pagination-info">Page 1 sur 1</span>
        <div class="pagination-buttons">
          <button class="btn btn-secondary btn-sm" id="prev-page" disabled><i class="fas fa-chevron-left"></i></button>
          <button class="btn btn-secondary btn-sm" id="next-page" disabled><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- CHECKLIST MODAL -->
<div class="modal" id="checklist-modal">
  <div class="modal-content" style="max-width:900px">
    <div class="modal-header">
      <h2 id="checklist-modal-title"><i class="fas fa-file-contract" style="color:var(--color-primary)"></i> Éditer la checklist</h2>
      <button class="modal-close" id="close-checklist-modal">&times;</button>
    </div>
    <div class="modal-body" style="display:block;padding:20px">
      <form id="checklist-form">
        <input type="hidden" id="checklist-id">
        <div class="form-row">
          <div class="form-group" style="flex:2"><label>Nom de la checklist *</label><input type="text" id="checklist-name" required placeholder="Ex: Maintenance Annuelle ORL"></div>
          <div class="form-group" style="flex:1">
            <label>Catégorie</label>
            <select id="checklist-category">
              <option value="Autre">Autre</option>
              <option value="Maintenance">Maintenance</option>
              <option value="Installation">Installation</option>
              <option value="Dépannage">Dépannage</option>
              <option value="Audit">Audit</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Description courte</label><textarea id="checklist-description" rows="2" placeholder="Instructions..."></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px;">
          <div>
            <div class="checklist-section-header">
              <h3><i class="fas fa-toolbox" style="color:#3b82f6"></i> Matériel Requis</h3>
              <button type="button" class="btn btn-sm btn-secondary" id="add-equipment-btn"><i class="fas fa-plus"></i></button>
            </div>
            <div id="equipment-list" class="checklist-items-list"></div>
          </div>
          <div>
            <div class="checklist-section-header">
              <h3><i class="fas fa-tasks" style="color:#8b5cf6"></i> Tâches à faire</h3>
              <button type="button" class="btn btn-sm btn-secondary" id="add-task-btn"><i class="fas fa-plus"></i></button>
            </div>
            <div id="tasks-list" class="checklist-items-list"></div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-checklist-btn">Annuler</button>
      <button class="btn-save" id="save-checklist-btn">Enregistrer</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal" id="delete-checklist-modal">
  <div class="modal-content" style="max-width:400px">
    <div class="modal-header">
      <h2 style="color:var(--color-danger)">Supprimer ?</h2>
      <button class="modal-close" id="close-delete-modal">&times;</button>
    </div>
    <div class="modal-body" style="display:block;padding:20px">
      <p style="color:var(--text-secondary)">Voulez-vous vraiment supprimer la checklist <strong id="delete-checklist-name"></strong> ?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-delete-checklist-btn">Annuler</button>
      <button class="btn btn-danger" id="confirm-delete-checklist-btn">Confirmer</button>
    </div>
  </div>
</div>

<div id="notification-container"></div>

<script src="/js/confirm.js"></script>
<script type="module" src="/js/init-selects.js"></script>
<script src="/js/loader.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/checklists.js"></script>
<script src="/js/mobile-menu.js"></script>
<script src="/js/theme-switcher.js"></script>
<script src="/js/sidebar-init.js"></script>
<script>

function openSettings() { window.location.href = '/admin.html'; }

fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (!d.user) return;
  document.getElementById('u-avatar').textContent = d.user.name[0].toUpperCase();
  document.getElementById('u-name').textContent = d.user.name;
  document.getElementById('u-role').textContent = d.user.role;
}).catch(() => {});
</script>
</body>
</html>
