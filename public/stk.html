<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signature STK — KB Med</title>
  <link rel="shortcut icon" href="/src/images/swiss_flag.webp" type="image/x-icon">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/layout-shared.css">
  <link rel="stylesheet" href="/css/toast.css">
  <link rel="stylesheet" href="/css/responsive-fix.css">
  <link rel="stylesheet" href="/css/global-fixes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    /* ── PAGE LAYOUT ── */
    .stk-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 53px);
      padding: 0 16px 16px;
      gap: 10px;
    }

    /* ── TOOLBAR ── */
    .stk-toolbar {
      background: var(--bg-elevated);
      border: 1px solid var(--border-primary);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 0;
      height: 52px;
      flex-shrink: 0;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 16px;
      border-right: 1px solid var(--border-primary);
      height: 100%;
    }

    .tool-group:last-child { border-right: none; }

    .tool-label {
      font-size: 10px;
      font-weight: var(--font-bold);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      margin-right: 4px;
    }

    /* ── SIGNATURES ── */
    .sig-list { display: flex; gap: 8px; flex-wrap: wrap; }

    .sig-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 3px;
      padding: 5px 10px;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition-fast);
    }

    .sig-card:hover { border-color: var(--color-primary); background: var(--bg-elevated); transform: translateY(-1px); }
    .sig-card:active { cursor: grabbing; }

    .sig-preview {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-elevated);
      border: 1px dashed var(--border-secondary);
      border-radius: 2px;
    }

    .sig-preview img { max-width: 100%; max-height: 100%; }

    .sig-name { font-size: var(--text-xs); font-weight: var(--font-semibold); color: var(--text-primary); }

    /* ── FILENAME ── */
    #filename-display {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      font-style: italic;
      margin-left: auto;
    }

    /* ── WORKSPACE ── */
    #workspace {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      overflow: auto;
      position: relative;
      display: flex;
      justify-content: center;
      padding: 32px;
    }

    #workspace.drag-over { background: rgba(44,90,160,0.06); border-color: var(--color-primary); }

    #pdf-wrapper {
      position: relative;
      background: white;
      box-shadow: var(--shadow-xl);
      transform-origin: top center;
      transition: transform 0.1s linear;
      display: none;
    }

    canvas { display: block; }

    /* ── ELEMENTS ON PDF ── */
    .element-wrapper { position: absolute; border: 1px solid transparent; cursor: default; z-index: 10; }
    .element-wrapper:hover { border: 1px dashed var(--neutral-400); }
    .element-wrapper.selected { border: 1px solid var(--color-primary); cursor: move; background: rgba(44,90,160,0.04); }
    .text-content { outline: none; white-space: nowrap; font-family: 'Helvetica', sans-serif; line-height: 1.2; padding: 2px 4px; min-width: 20px; }
    .image-wrapper img { width: 100%; height: 100%; pointer-events: none; display: block; }

    /* ── EMPTY STATE ── */
    #empty-state {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-tertiary);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #empty-state i { font-size: 48px; opacity: 0.2; }
    #empty-state div { font-size: var(--text-sm); line-height: var(--leading-relaxed); }

    /* ── ZOOM CONTROLS ── */
    #zoom-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-elevated);
      padding: 5px 12px;
      border: 1px solid var(--border-primary);
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 50;
      box-shadow: var(--shadow-md);
    }

    #zoom-level {
      font-weight: var(--font-semibold);
      font-size: var(--text-xs);
      min-width: 40px;
      text-align: center;
      color: var(--text-primary);
    }

    /* ── CONTEXT MENU ── */
    #context-menu {
      position: absolute;
      display: none;
      background: var(--neutral-800);
      color: white;
      border-radius: 4px;
      padding: 6px;
      gap: 6px;
      z-index: 1000;
      box-shadow: var(--shadow-xl);
      align-items: center;
    }

    [data-theme="dark"] #context-menu { background: var(--neutral-700); }

    .ctx-btn {
      background: var(--neutral-700);
      border: none;
      color: white;
      width: 28px; height: 28px;
      border-radius: 3px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    .ctx-btn:hover { background: var(--neutral-600); }
    .ctx-btn.red:hover { background: var(--color-danger); }

    .ctx-divider { width: 1px; height: 16px; background: var(--neutral-600); margin: 0 2px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .stk-container { padding: 0 12px 12px; height: auto; }
      .stk-toolbar { height: auto; flex-wrap: wrap; padding: 10px 12px; gap: 8px; }
      .tool-group { border-right: none; padding-right: 0; }
      .sig-list { flex-wrap: wrap; }
      #workspace { padding: 16px; min-height: 400px; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/src/images/logo-kbmed-short.svg" alt="KB Med">
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html"><i class="fas fa-chart-line"></i><span>Tableau de bord</span></a>
      <a href="/clients.html"><i class="fas fa-users"></i><span>Clients</span></a>
      <a href="/checklists.html"><i class="fas fa-clipboard-check"></i><span>Checklists</span></a>
      <a href="/reports.html"><i class="fas fa-file-alt"></i><span>Rapports</span></a>
      <a href="/stk.html" class="active"><i class="fas fa-file-signature"></i><span>STK</span></a>
      <a href="/tickets.html"><i class="fas fa-ticket-alt"></i><span>Tickets</span></a>
      <a href="/admin.html"><i class="fas fa-book"></i><span>Catalogue & Matériel</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="user-info">
        <div class="user-avatar" id="u-avatar">?</div>
        <div>
          <div class="user-name" id="u-name">...</div>
          <div class="user-role" id="u-role">...</div>
        </div>
      </div>
      <div class="sidebar-btn-row">
        <button class="sidebar-btn" onclick="openPreferencesModal()">
          <i class="fas fa-cog"></i> Mes préférences
        </button>
        <button class="sidebar-btn danger" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Quitter</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <div class="header-title-group">
        <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1><i class="fas fa-file-signature"></i> Signature des STK</h1>
      </div>
      <div class="header-actions-group">
        <input type="file" id="file-input" accept="application/pdf" hidden>
        <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">
          <i class="fas fa-folder-open"></i> <span class="btn-label">Ouvrir PDF</span>
        </button>
        <button class="btn btn-primary" onclick="savePdf()">
          <i class="fas fa-save"></i> <span class="btn-label">Enregistrer</span>
        </button>
      </div>
    </div>

    <div class="stk-container">
      <!-- TOOLBAR -->
      <div class="stk-toolbar">
        <div class="tool-group">
          <span class="tool-label">Outils</span>
          <button class="btn btn-sm btn-secondary" id="btn-text" onclick="activateTextTool()">
            <i class="fas fa-font"></i> Ajouter Texte
          </button>
        </div>

        <div class="tool-group" style="padding-left:16px">
          <span class="tool-label">Techniciens</span>
          <div class="sig-list" id="sig-list-container">
            <div class="sig-card" draggable="true" ondragstart="handleDragStart(event)">
              <div class="sig-preview"><img src="./src/images/signatures/david_obrist-2.png" id="sign_dobrist"></div>
              <div class="sig-name">David Obrist</div>
            </div>
            <div class="sig-card" draggable="true" ondragstart="handleDragStart(event)">
              <div class="sig-preview"><img src="./src/images/signatures/david_blaser.png" id="sign_dblaser"></div>
              <div class="sig-name">David Blaser</div>
            </div>
            <div class="sig-card" draggable="true" ondragstart="handleDragStart(event)">
              <div class="sig-preview"><img src="./src/images/signatures/alexis_medus.png" id="sign_amedus"></div>
              <div class="sig-name">Alexis Medus</div>
            </div>
            <div class="sig-card" draggable="true" ondragstart="handleDragStart(event)">
              <div class="sig-preview"><img src="./src/images/signatures/marvin_blaser.png" id="sign_mblaser"></div>
              <div class="sig-name">Marvin Blaser</div>
            </div>
          </div>
        </div>

        <div id="filename-display">Aucun fichier chargé</div>
      </div>

      <!-- WORKSPACE -->
      <div id="workspace">
        <div id="empty-state">
          <i class="fas fa-cloud-upload-alt"></i>
          <div>Glissez un rapport STK ici<br><span style="font-size:var(--text-xs)">ou utilisez le bouton Ouvrir</span></div>
        </div>

        <div id="pdf-wrapper">
          <canvas id="pdf-render"></canvas>
        </div>

        <div id="zoom-controls">
          <button class="btn-icon-sm" onclick="updateZoom(-0.1)"><i class="fas fa-minus"></i></button>
          <span id="zoom-level">100%</span>
          <button class="btn-icon-sm" onclick="updateZoom(0.1)"><i class="fas fa-plus"></i></button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- CONTEXT MENU -->
<div id="context-menu">
  <div id="ctx-text-tools" style="display:none;gap:5px;align-items:center">
    <button class="ctx-btn" onclick="changeFontSize(-2)" title="Réduire"><i class="fas fa-minus"></i></button>
    <button class="ctx-btn" onclick="changeFontSize(2)" title="Agrandir"><i class="fas fa-plus"></i></button>
    <div class="ctx-divider"></div>
    <div onclick="changeColor('#000000')" style="width:16px;height:16px;background:#000;border-radius:50%;cursor:pointer;border:2px solid #555"></div>
    <div onclick="changeColor('#2563eb')" style="width:16px;height:16px;background:#2563eb;border-radius:50%;cursor:pointer;border:2px solid #555"></div>
    <div onclick="changeColor('#ef4444')" style="width:16px;height:16px;background:#ef4444;border-radius:50%;cursor:pointer;border:2px solid #555"></div>
  </div>
  <div id="ctx-image-tools" style="display:none;gap:5px;align-items:center">
    <button class="ctx-btn" onclick="changeImageSize(0.9)"><i class="fas fa-compress-alt"></i></button>
    <button class="ctx-btn" onclick="changeImageSize(1.1)"><i class="fas fa-expand-alt"></i></button>
  </div>
  <div class="ctx-divider"></div>
  <button class="ctx-btn red" onclick="deleteElement()"><i class="fas fa-trash"></i></button>
</div>

<div id="notification-container"></div>

<script src="/js/confirm.js"></script>
<script src="/js/stk.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/loader.js"></script>
<script src="/js/mobile-menu.js"></script>
<script src="/js/theme-switcher.js"></script>
<script src="/js/sidebar-init.js"></script>
<script>

function openSettings() { window.location.href = '/admin.html'; }

fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (!d.user) return;
  document.getElementById('u-avatar').textContent = d.user.name[0].toUpperCase();
  document.getElementById('u-name').textContent = d.user.name;
  document.getElementById('u-role').textContent = d.user.role;
}).catch(() => {});
</script>
</body>
</html>
